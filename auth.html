<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성인 인증 - 로또 번호 추출기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px var(--shadow);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: background-color 0.3s;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 2.5rem;
            line-height: 1.6;
            color: var(--text-color);
            font-size: 1.1rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .auth-btn {
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-yes {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>🔞 성인 인증</h2>
        <p>본 서비스는 사행성 방지를 위해<br><strong>만 19세 이상 성인</strong>만 이용 가능합니다.<br><br>본인은 성인입니까?</p>
        
        <div class="btn-group">
            <button class="auth-btn btn-yes" onclick="verifyAdult()">네, 성인입니다</button>
            <button class="auth-btn btn-no" onclick="denyAdult()">아니오, 미성년자입니다</button>
        </div>

        <div class="footer-note">
            인증 정보는 브라우저를 닫기 전까지 유지됩니다.
        </div>
    </div>

    <script>
        // 기존 테마 설정 적용
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function verifyAdult() {
            sessionStorage.setItem('adultVerified', 'true');
            window.location.href = 'index.html'; // 메인 페이지로 이동
        }

        function denyAdult() {
            alert('죄송합니다. 미성년자는 본 서비스를 이용할 수 없습니다.');
            window.location.href = 'https://www.google.com';
        }

        // 이미 인증된 경우 바로 index.html로 이동
        if (sessionStorage.getItem('adultVerified') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
