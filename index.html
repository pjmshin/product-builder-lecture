<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추출기</title>
    <style>
        :root {
            /* Light Mode */
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --set-bg: #f9f9f9;
            --border-color: #eee;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            /* Dark Mode */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --set-bg: #2a2a2a;
            --border-color: #333;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        body.verified {
            overflow: auto;
        }

        .container {
            position: relative;
            background-color: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 95%;
            transition: background-color 0.3s, box-shadow 0.3s;
            filter: blur(10px);
            pointer-events: none;
        }

        body.verified .container {
            filter: blur(0);
            pointer-events: auto;
        }

        /* 성인 인증 모달 */
        #auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .modal-content p {
            margin-bottom: 2rem;
            line-height: 1.6;
            color: var(--text-color);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .auth-btn {
            flex: 1;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-yes {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .theme-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        h1 {
            margin-bottom: 2rem;
            color: var(--primary-color);
            font-weight: 800;
            margin-top: 0.5rem;
        }

        .lotto-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 2.5rem;
        }

        .lotto-set {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: var(--set-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .ball {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .ball-10 { background: linear-gradient(135deg, #fbc400, #f8a500); }
        .ball-20 { background: linear-gradient(135deg, #69c8f2, #2a9cdb); }
        .ball-30 { background: linear-gradient(135deg, #ff7272, #e63946); }
        .ball-40 { background: linear-gradient(135deg, #aaaaaa, #777777); }
        .ball-50 { background: linear-gradient(135deg, #b0d840, #7cb342); }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
        }

        @media (max-width: 420px) {
            .ball { width: 34px; height: 34px; font-size: 0.9rem; }
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body class="light-mode">

    <!-- 성인 인증 모달 -->
    <div id="auth-modal">
        <div class="modal-content">
            <h2>🔞 성인 인증</h2>
            <p>본 서비스는 사행성 방지를 위해<br><strong>만 19세 이상 성인</strong>만 이용 가능합니다.<br>본인은 성인입니까?</p>
            <div class="btn-group">
                <button class="auth-btn btn-yes" onclick="verifyAdult()">네, 성인입니다</button>
                <button class="auth-btn btn-no" onclick="denyAdult()">아니오</button>
            </div>
        </div>
    </div>

    <div class="container">
        <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle">
            <span id="theme-icon">🌙</span> <span id="theme-text">다크 모드</span>
        </button>
        
        <h1>로또 번호 추출기</h1>
        <div id="lotto-display" class="lotto-container"></div>
        <button class="action-btn" onclick="renderLottoSets()">번호 추출하기</button>
    </div>

    <script>
        function checkVerification() {
            const isVerified = sessionStorage.getItem('adultVerified');
            if (isVerified === 'true') {
                document.body.classList.add('verified');
                document.getElementById('auth-modal').style.display = 'none';
            }
        }

        function verifyAdult() {
            sessionStorage.setItem('adultVerified', 'true');
            document.body.classList.add('verified');
            document.getElementById('auth-modal').style.display = 'none';
        }

        function denyAdult() {
            alert('죄송합니다. 미성년자는 본 서비스를 이용할 수 없습니다.');
            window.location.href = 'https://www.google.com'; // 외부로 리다이렉트 (선택 사항)
        }

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                themeIcon.innerText = '🌙';
                themeText.innerText = '다크 모드';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark-mode');
                themeIcon.innerText = '☀️';
                themeText.innerText = '라이트 모드';
                localStorage.setItem('theme', 'dark');
            }
        }

        window.onload = function() {
            checkVerification();
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').innerText = '☀️';
                document.getElementById('theme-text').innerText = '라이트 모드';
            }
            renderLottoSets();
        };

        function getBallColorClass(num) {
            if (num <= 10) return 'ball-10';
            if (num <= 20) return 'ball-20';
            if (num <= 30) return 'ball-30';
            if (num <= 40) return 'ball-40';
            return 'ball-50';
        }

        function generateSingleSet() {
            const numbers = new Set();
            while (numbers.size < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                numbers.add(num);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        function renderLottoSets() {
            const display = document.getElementById('lotto-display');
            display.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const set = generateSingleSet();
                const setDiv = document.createElement('div');
                setDiv.className = 'lotto-set';
                set.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.innerText = num;
                    setDiv.appendChild(ball);
                });
                display.appendChild(setDiv);
            }
        }
    </script>
</body>
</html>
