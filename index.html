<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 - 로또 번호 추출기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: background-color 0.3s;
        }

        h2 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 2rem;
        }

        p {
            margin-bottom: 2.5rem;
            line-height: 1.6;
            color: var(--text-color);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            flex: 1;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-yes {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>🔞 성인 인증</h2>
        <p>본 서비스는 성인 전용입니다.<br><strong>만 19세 이상</strong>이십니까?</p>
        
        <div class="btn-group">
            <button class="auth-btn btn-yes" onclick="verifyAdult()">네, 맞습니다</button>
            <button class="auth-btn btn-no" onclick="denyAdult()">아니오</button>
        </div>
    </div>

    <script>
        // 이미 인증된 경우 바로 lotto.html로 이동
        if (sessionStorage.getItem('adultVerified') === 'true') {
            window.location.href = 'lotto.html';
        }

        // 테마 설정
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function verifyAdult() {
            sessionStorage.setItem('adultVerified', 'true');
            alert('인증되었습니다. 로또 번호 추출 페이지로 이동합니다.');
            window.location.href = 'lotto.html';
        }

        function denyAdult() {
            alert('미성년자는 이용할 수 없습니다. 메인 페이지로 돌아갑니다.');
            window.location.reload(); // 현재 페이지(메인) 다시 로드
        }
    </script>
</body>
</html>
